{% extends "base.html" %}

{% block title %}Создание проекта{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">📁 Новый проект</div>
    <form method="post">
        <div class="form-group">
            <label>Название проекта</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Тип проекта</label>
            <select name="type_id" required>
                {% for t in types %}
                <option value="{{ t.TypeID }}">{{ t.TypeName }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Заказчик</label>
            <select name="customer_id" required>
                {% for c in customers %}
                <option value="{{ c.CustomerID }}">{{ c.CustomerName }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" rows="4"></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Дата начала</label>
                <input type="date" name="start_date" required>
            </div>
            <div class="form-group">
                <label>Дата окончания</label>
                <input type="date" name="end_date" required>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Бюджет</label>
                <input type="number" name="budget" step="0.01">
            </div>
            <div class="form-group">
                <label>Приоритет (1-5)</label>
                <input type="number" name="priority" min="1" max="5" value="3">
            </div>
        </div>
        <button type="submit" class="btn btn-success">Создать проект</button>
        <a href="{{ url_for('projects_list') }}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
