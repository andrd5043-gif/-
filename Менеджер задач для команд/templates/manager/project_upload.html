{% extends "base.html" %}

{% block title %}Загрузка документа{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">📎 Загрузка документа для {{ project.ProjectName }}</div>
    
    <form method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>Название документа</label>
            <input type="text" name="name" placeholder="Например: План этажа 1">
        </div>
        
        <div class="form-group">
            <label>Файл *</label>
            <input type="file" name="file" required>
            <small>Разрешены: PDF, DWG, DXF, DOC, DOCX, XLS, XLSX, JPG, PNG</small>
        </div>
        
        <button type="submit" class="btn btn-success">📤 Загрузить</button>
        <a href="{{ url_for('project_detail', project_id=project.ProjectID) }}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
